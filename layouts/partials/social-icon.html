{{ $name := lower (.name | default "") }}
{{ if eq $name "github" }}
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77 5.44 5.44 0 0 0 3.5 8.55c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
  </svg>
{{ else if eq $name "linkedin" }}
  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M6.94 8.5a1.56 1.56 0 1 1 0-3.12 1.56 1.56 0 0 1 0 3.12ZM8.5 18.5H5.38V9.75H8.5v8.75Zm10.12 0h-3.12v-4.26c0-1.02-.02-2.33-1.42-2.33-1.43 0-1.65 1.11-1.65 2.26v4.33H9.31V9.75h2.99v1.19h.04c.42-.79 1.43-1.62 2.94-1.62 3.14 0 3.72 2.07 3.72 4.76v4.42Z"></path>
  </svg>
{{ else if or (eq $name "x") (eq $name "twitter") }}
  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M18.244 2.25h3.308L14.325 10.51 22.827 21.75H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117Z"></path>
  </svg>
{{ else if eq $name "email" }}
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
    <path d="M3 7l9 6 9-6"></path>
  </svg>
{{ else }}
  <span class="social-label">{{ .label }}</span>
{{ end }}
