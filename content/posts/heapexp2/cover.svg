  <text x="760" y="220" fill="#7ee787" font-size="20" font-family="Cascadia Code, Consolas, monospace">0x4012c0   push rbp</text>
  <text x="760" y="255" fill="#f0f6fc" font-size="20" font-family="Cascadia Code, Consolas, monospace">0x4012c1   mov rbp, rsp</text>
