  <text x="96" y="230" fill="#f0f6fc" font-size="54" font-family="Segoe UI, Arial, sans-serif">Heap Exploitation Part 2</text>
  <text x="96" y="285" fill="#8b949e" font-size="26" font-family="Segoe UI, Arial, sans-serif">Memory Allocation and Deallocation Process</text>
  <rect x="96" y="340" width="420" height="18" rx="9" fill="#6f4a23" opacity="0.9"/>
  <rect x="96" y="376" width="520" height="12" rx="6" fill="#30363d"/>
